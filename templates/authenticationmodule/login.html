<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Career Flow</title>

<style>
:root{
 --primary:#0a66c2;
 --dark:#1f2937;
 --gray:#6b7280;
 --light:#f9fafb;
}

*{
 margin:0;
 padding:0;
 box-sizing:border-box;
 font-family:"Segoe UI",Roboto,sans-serif;
}

body{
 height:100vh;
 display:flex;
 justify-content:center;
 align-items:center;
 background:var(--light);
}

.card{
 width:100%;
 max-width:400px;
 background:#fff;
 padding:40px;
 border-radius:16px;
 box-shadow:0 20px 50px rgba(0,0,0,0.08);
}

.logo{
 text-align:center;
 margin-bottom:20px;
}

.logo img{
 width:70px;
 border-radius:10px;
}

.logo h3{
 margin-top:8px;
 color:var(--dark);
}

h2{
 text-align:center;
 margin-bottom:20px;
 color:var(--dark);
}

input{
 width:100%;
 padding:12px;
 margin-bottom:15px;
 border-radius:8px;
 border:1px solid #d1d5db;
 font-size:14px;
}

input:focus{
 outline:none;
 border-color:var(--primary);
}

button{
 width:100%;
 padding:12px;
 border:none;
 border-radius:10px;
 background:var(--primary);
 color:#fff;
 font-size:15px;
 cursor:pointer;
 transition:0.3s;
}

button:hover{
 background:#084b94;
}

button:disabled{
 background:#9ca3af;
 cursor:not-allowed;
}

.links{
 display:flex;
 justify-content:space-between;
 margin-top:12px;
 font-size:13px;
}

.links a{
 text-decoration:none;
 color:var(--primary);
}

.message{
 text-align:center;
 margin-top:12px;
 display:none;
 font-size:13px;
}

.error{color:#dc2626;}
.success{color:#047857;}
</style>
</head>

<body>

<div class="card">

<div class="logo">
 <img src="../photo/logo.jpg" alt="Logo">
 <h3>Career Flow</h3>
</div>

<h2>Sign In</h2>

<form onsubmit="loginUser(event)">
 <input type="email" id="email" placeholder="Enter email" required>
 <input type="password" id="password" placeholder="Enter password" required>

 <button id="loginBtn" type="submit">Continue</button>
</form>

<div id="error" class="message error"></div>
<div id="success" class="message success"></div>

<div class="links">
 <a href="register.html">Create account</a>
 <a href="#">Forgot password?</a>
</div>

</div>

<script>
const API = "http://127.0.0.1:8000";

async function loginUser(e){
 e.preventDefault();

 const email = document.getElementById("email").value.trim();
 const password = document.getElementById("password").value.trim();

 const error = document.getElementById("error");
 const success = document.getElementById("success");
 const btn = document.getElementById("loginBtn");

 error.style.display = "none";
 success.style.display = "none";

 // 🔒 Validation
 if(!email || !password){
  error.innerText = "Please fill all fields";
  error.style.display = "block";
  return;
 }

 btn.disabled = true;
 btn.innerText = "Sending OTP...";

 try{
  const res = await fetch(API + "/login", {
   method: "POST",
   headers: {
    "Content-Type": "application/json"
   },
   body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if(!res.ok){
   error.style.display = "block";
   error.innerText = data.detail || "Login failed";
   btn.disabled = false;
   btn.innerText = "Continue";
   return;
  }

  // ✅ SAVE EMAIL FOR OTP PAGE
  localStorage.setItem("temp_email", email);

  success.style.display = "block";
  success.innerText = "OTP sent to your email";

  setTimeout(()=>{
   window.location.href = "verify_otp1.html";
  }, 1200);

 }catch(err){
  error.style.display = "block";
  error.innerText = "Server not running!";
  console.error(err);

  btn.disabled = false;
  btn.innerText = "Continue";
 }
}
</script>

</body>
</html>
