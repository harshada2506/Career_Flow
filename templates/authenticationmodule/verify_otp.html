<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OTP Verification | Career Flow</title>

<style>
:root {
    --primary: #0a66c2;
    --dark: #1f2937;
    --gray: #6b7280;
    --light: #f9fafb;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", Roboto, sans-serif;
}

body {
    min-height: 100vh;
    background: var(--light);
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    width: 100%;
    max-width: 420px;
    background: #fff;
    border-radius: 18px;
    padding: 45px;
    box-shadow: 0 22px 55px rgba(0,0,0,0.08);
    text-align: center;
}

.logo {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    margin-bottom: 25px;
}

.logo img {
    width: 42px;
}

.logo h1 {
    font-size: 24px;
    font-weight: 600;
}

h2 {
    font-size: 22px;
    margin-bottom: 8px;
    color: var(--dark);
}

.subtitle {
    font-size: 14px;
    color: var(--gray);
    margin-bottom: 25px;
}

input {
    width: 100%;
    padding: 14px;
    font-size: 18px;
    text-align: center;
    letter-spacing: 6px;
    border-radius: 10px;
    border: 1.6px solid #d1d5db;
}

input:focus {
    outline: none;
    border-color: var(--primary);
}

button {
    width: 100%;
    margin-top: 20px;
    padding: 13px;
    border-radius: 10px;
    border: none;
    background: var(--primary);
    color: #fff;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
}

button:hover {
    background: #084b94;
}

.message {
    font-size: 13px;
    margin-top: 15px;
    display: none;
}

.error {
    color: #dc2626;
}

.success {
    color: #047857;
}
</style>
</head>

<body>

<div class="card">

    <div class="logo">
        <img src="../photo/logo.jpg" alt="Career Flow Logo" >
        <h1>Career Flow</h1>
    </div>

    <h2>Verify OTP</h2>
    <div class="subtitle" id="otpInfo">
        Enter the 6-digit OTP sent to you
    </div>

    <input 
        type="text" 
        id="otp"
        placeholder="••••••"
        maxlength="6"
        required
    >

    <button onclick="verifyOtp()">Verify & Continue</button>

    <div id="errorMsg" class="message error"></div>
    <div id="successMsg" class="message success"></div>

</div>

<script>
const API_BASE = "http://127.0.0.1:8000";

const pendingEmail = localStorage.getItem("pending_email");
const otpInfo = document.getElementById("otpInfo");

if (!pendingEmail) {
    window.location.href = "register.html";
}

if (pendingEmail) {
    otpInfo.innerText = "Enter the OTP sent to " + pendingEmail;
}

async function verifyOtp() {
    const otp = document.getElementById("otp").value.trim();
    const errorMsg = document.getElementById("errorMsg");
    const successMsg = document.getElementById("successMsg");

    errorMsg.style.display = "none";
    successMsg.style.display = "none";

    if (!/^\d{6}$/.test(otp)) {
        errorMsg.innerText = "OTP must be a 6-digit number.";
        errorMsg.style.display = "block";
        return;
    }

    try {
        const payload = {
            email: pendingEmail,
            otp: otp
        };

        const res = await fetch(API_BASE + "/verify-otp", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
        });

        const raw = await res.text();
        let data = {};

        try {
            data = JSON.parse(raw);
        } catch (e) {
            data = { detail: raw };
        }

        if (!res.ok) {
            errorMsg.innerText = data.detail || "OTP verification failed.";
            errorMsg.style.display = "block";
            return;
        }

        successMsg.innerText = "OTP verified successfully!";
        successMsg.style.display = "block";

        localStorage.removeItem("pending_email");

        setTimeout(() => {
            window.location.href = "login.html";
        }, 1200);

    } catch (e) {
        console.error("Verify OTP error:", e);
        errorMsg.innerText = "Backend not reachable. Start server: uvicorn main:app --reload";
        errorMsg.style.display = "block";
    }
}
</script>

</body>
</html>
