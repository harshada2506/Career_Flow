<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password | Career Flow</title>

<style>
:root{
 --primary:#0a66c2;
 --dark:#1f2937;
 --gray:#6b7280;
 --light:#f9fafb;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",Roboto,sans-serif;}

body{
 min-height:100vh;
 background:var(--light);
 display:flex;
 justify-content:center;
 align-items:center;
}

.card{
 width:100%;
 max-width:460px;
 background:white;
 border-radius:18px;
 padding:45px;
 box-shadow:0 22px 55px rgba(0,0,0,0.08);
}

.logo{
 text-align:center;
 margin-bottom:20px;
 display:flex;
 flex-direction:column;
 align-items:center;
 gap:10px;
}

.logo img{
 width:80px;
 height:auto;
}

.logo h1{
 font-size:24px;
 color:var(--dark);
}

h2{
 text-align:center;
 margin-bottom:6px;
}

.subtitle{
 text-align:center;
 font-size:14px;
 color:var(--gray);
 margin-bottom:30px;
}

label{
 font-size:13px;
 color:var(--dark);
}

input{
 width:100%;
 padding:12px;
 margin-top:6px;
 margin-bottom:18px;
 border-radius:8px;
 border:1.6px solid #d1d5db;
 font-size:14px;
}

input:focus{
 outline:none;
 border-color:var(--primary);
}

button{
 width:100%;
 padding:13px;
 border:none;
 border-radius:10px;
 background:var(--primary);
 color:white;
 font-size:15px;
 cursor:pointer;
}

button:hover{background:#084b94;}

.message{
 text-align:center;
 font-size:13px;
 margin-top:10px;
 display:none;
}

.error{color:#dc2626;}
.success{color:#047857;}

.links{
 margin-top:20px;
 text-align:center;
 font-size:13px;
}
.links a{
 color:var(--primary);
 text-decoration:none;
}
.links a:hover{text-decoration:underline;}
</style>
</head>

<body>

<div class="card">

<div class="logo">
  <!-- Logo image -->
  <img src="../photo/logo.jpg" alt="Career Flow Logo">
  <h1>Career Flow</h1>
</div>

<h2>Forgot Password</h2>
<div class="subtitle">Enter your registered email or phone number</div>

<form onsubmit="sendReset(event)">

<label>Email or Phone</label>
<input 
 type="text"
 id="contact"
 placeholder="example@company.com or 9876543210"
>

<button type="submit">Send OTP</button>

</form>

<div id="errorMsg" class="message error"></div>
<div id="successMsg" class="message success"></div>

<div class="links">
<a href="login.html">Back to Sign In</a>
</div>

</div>

<script>
function sendReset(e){
 e.preventDefault();

 const contact=document.getElementById("contact").value.trim();
 const error=document.getElementById("errorMsg");
 const success=document.getElementById("successMsg");

 error.style.display="none";
 success.style.display="none";

 const emailRegex=/^[a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.(com|org|edu|in|net)$/;
 const phoneRegex=/^[6-9]\d{9}$/;

 if(!contact){
  error.style.display="block";
  error.innerText="Enter registered email OR phone number.";
  return;
 }

 if(!emailRegex.test(contact) && !phoneRegex.test(contact)){
  error.style.display="block";
  error.innerText="Enter a valid official email or 10-digit Indian mobile number.";
  return;
 }

 success.style.display="block";
 success.innerText="OTP sent successfully (simulation). Redirecting...";

 setTimeout(()=>{
  window.location.href="forgot_otp.html";
 },1500);
}
</script>

</body>
</html>
