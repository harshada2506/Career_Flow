<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify OTP | Career Flow</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f3f6f8;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:white;
    padding:30px;
    border-radius:12px;
    width:350px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.logo{
    text-align:center;
    margin-bottom:15px;
}

.logo img{
    width:70px;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin-bottom:12px;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:16px;
    text-align:center;
    letter-spacing:4px;
}

button{
    width:100%;
    padding:10px;
    background:#0a66c2;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#084b94;
}

.info{
    text-align:center;
    font-size:13px;
    color:gray;
    margin-bottom:10px;
}

.error{
    color:red;
    font-size:13px;
    text-align:center;
    display:none;
}
</style>
</head>

<body>

<div class="card">

<div class="logo">
    <img src="../photo/logo.jpg" alt="Career Flow Logo">
</div>

<h2>OTP Verification</h2>

<div class="info">
Enter the 6-digit OTP sent to your email
</div>

<form onsubmit="verifyOTP(event)">
<input type="text" id="otp" placeholder="Enter OTP" maxlength="6" required>
<div id="error" class="error"></div>
<button type="submit">Verify OTP</button>
</form>

</div>

<script>
async function verifyOTP(e){
    e.preventDefault();

    const otp = document.getElementById("otp").value.trim();
    const error = document.getElementById("error");

    error.style.display = "none";

    // Validate OTP format
    if(!/^[0-9]{6}$/.test(otp)){
        error.innerText = "OTP must be 6 digits";
        error.style.display = "block";
        return;
    }

    // Get email from previous step
    const email = localStorage.getItem("reset_email");

    if(!email){
        error.innerText = "Session expired. Try again.";
        error.style.display = "block";
        return;
    }

    const API_BASE = "http://127.0.0.1:8000";

    try{
        console.log("Sending OTP verify request...");

        const res = await fetch(API_BASE + "/verify-forgot-otp", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email: email,
                otp: otp
            })
        });

        const data = await res.json();
        console.log("Response:", data);

        if(!res.ok){
            error.innerText = data.detail || "Invalid OTP";
            error.style.display = "block";
            return;
        }

        // OTP success
        localStorage.setItem("otp_verified", "true");

        // Redirect to reset password page
        window.location.href = "set_new_password.html";

    }catch(err){
        console.error(err);
        error.innerText = "Backend not reachable";
        error.style.display = "block";
    }
}
</script>

</body>
</html>
