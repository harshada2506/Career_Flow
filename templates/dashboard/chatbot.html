<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CareerFlow AI Chatbot</title>

<style>
body{
    margin:0;
    font-family: "Segoe UI", Arial, sans-serif;
    background:#eef3f8;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* Chat Container */
.chat-container{
    width:420px;
    height:600px;
    background:#ffffff;
    border-radius:16px;
    box-shadow:0 15px 35px rgba(0,0,0,0.1);
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

/* Header */
.chat-header{
    background:#0a66c2;
    color:white;
    padding:15px;
    font-size:18px;
    display:flex;
    align-items:center;
}

.chat-header span{
    margin-left:8px;
}

/* Chat Body */
.chat-body{
    flex:1;
    padding:15px;
    overflow-y:auto;
    background:#f9fbfd;
}

/* Messages */
.message{
    max-width:75%;
    padding:10px 14px;
    margin-bottom:12px;
    border-radius:12px;
    font-size:14px;
    line-height:1.4;
}

.bot{
    background:#e4e6eb;
}

.user{
    background:#0a66c2;
    color:white;
    margin-left:auto;
}

/* Typing */
.typing{
    font-size:13px;
    color:#888;
    margin-bottom:10px;
}

/* Footer */
.chat-footer{
    display:flex;
    padding:12px;
    border-top:1px solid #ddd;
    background:white;
}

.chat-footer input{
    flex:1;
    padding:10px;
    border-radius:20px;
    border:1px solid #ccc;
    outline:none;
}

.chat-footer button{
    margin-left:8px;
    padding:10px 16px;
    border:none;
    border-radius:20px;
    background:#0a66c2;
    color:white;
    cursor:pointer;
}

.chat-footer button:hover{
    background:#004182;
}
</style>
</head>

<body>

<div class="chat-container">

    <div class="chat-header">
        🤖 <span>CareerFlow AI Assistant</span>
    </div>

    <div class="chat-body" id="chatBody">
        <div class="message bot">
            Hello 👋 I’m your CareerFlow AI Assistant.  
            Ask me about jobs, internships, resume tips, or interview preparation!
        </div>
    </div>

    <div class="chat-footer">
        <input type="text" id="userInput" placeholder="Type your message..." 
        onkeydown="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>
function sendMessage(){

    let input = document.getElementById("userInput");
    let message = input.value.trim();

    if(message === "") return;

    let chatBody = document.getElementById("chatBody");

    // User message
    let userMsg = document.createElement("div");
    userMsg.className = "message user";
    userMsg.innerText = message;
    chatBody.appendChild(userMsg);

    input.value = "";

    // Typing indicator
    let typing = document.createElement("div");
    typing.className = "typing";
    typing.innerText = "AI is typing...";
    chatBody.appendChild(typing);

    chatBody.scrollTop = chatBody.scrollHeight;

    setTimeout(async function(){

    chatBody.removeChild(typing);

    const res = await fetch("http://127.0.0.1:8000/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: message })
    });

    const data = await res.json();

    let botMsg = document.createElement("div");
    botMsg.className = "message bot";
    botMsg.innerText = data.reply;

    chatBody.appendChild(botMsg);

    chatBody.scrollTop = chatBody.scrollHeight;

}, 1000);
}

function getBotReply(msg){

    msg = msg.toLowerCase();

    if(msg.includes("job"))
        return "You can explore the latest job openings in the Jobs section 💼.";

    if(msg.includes("internship"))
        return "Check the Internship section for student opportunities 🎓.";

    if(msg.includes("resume"))
        return "Keep your resume concise (1 page), highlight skills and real projects.";

    if(msg.includes("interview"))
        return "Practice common HR questions and revise core technical concepts.";

    if(msg.includes("profile"))
        return "You can update your profile details from the Profile section.";

    return "I’m here to help with career guidance. Ask about jobs, internships, resume tips or interviews!";
}
</script>

</body>
</html>
